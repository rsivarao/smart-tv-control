<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Samsung TV Screen</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
}

#cursor{
width:30px;
height:30px;
background:white;
border-radius:50%;
position:absolute;
left:100px;
top:100px;
box-shadow:0 0 20px white;
transition:0.03s;
}

h1{
color:white;
position:absolute;
top:20px;
left:20px;
font-family:Arial;
}

</style>

</head>
<body>

<h1>Samsung TV Controller</h1>

<div id="cursor"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
onValue
}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyCzMfufMKKbFrlfGJed7qNws_TxdMfs1gs",

authDomain: "tv-controllerbysiva.firebaseapp.com",

databaseURL: "https://tv-controllerbysiva-default-rtdb.firebaseio.com/",

projectId: "tv-controllerbysiva",

storageBucket: "tv-controllerbysiva.appspot.com",

messagingSenderId: "465038654438",

appId: "1:465038654438:web:92839d8e5ce222dc643427"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const cursor=document.getElementById("cursor");

let x=300;
let y=300;

onValue(ref(db,"move"),(snapshot)=>{

const data=snapshot.val();

if(!data)return;

x+=data.dx*2;
y+=data.dy*2;

x=Math.max(0,Math.min(window.innerWidth-30,x));
y=Math.max(0,Math.min(window.innerHeight-30,y));

cursor.style.left=x+"px";
cursor.style.top=y+"px";

});

</script>

</body>
</html>
