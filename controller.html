<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Phone Controller</title>

<style>

body{
margin:0;
background:#111;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
touch-action:none;
}

#pad{
width:90vw;
height:90vh;
background:#222;
border-radius:20px;
border:2px solid #444;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-family:Arial;
font-size:24px;
}

</style>

</head>
<body>

<div id="pad">
Touch And Drag
</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
set
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyCzMfufMKKbFrlfGJed7qNws_TxdMfs1gs",

authDomain: "tv-controllerbysiva.firebaseapp.com",

databaseURL: "https://tv-controllerbysiva-default-rtdb.firebaseio.com/",

projectId: "tv-controllerbysiva",

storageBucket: "tv-controllerbysiva.appspot.com",

messagingSenderId: "465038654438",

appId: "1:465038654438:web:92839d8e5ce222dc643427"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

let lastX=0;
let lastY=0;
let touching=false;

document.addEventListener("touchstart",(e)=>{

touching=true;

const touch=e.touches[0];

lastX=touch.clientX;
lastY=touch.clientY;

});

document.addEventListener("touchend",()=>{

touching=false;

});

document.addEventListener("touchmove",(e)=>{

if(!touching)return;

e.preventDefault();

const touch=e.touches[0];

const dx=touch.clientX-lastX;
const dy=touch.clientY-lastY;

lastX=touch.clientX;
lastY=touch.clientY;

set(ref(db,"move"),{

dx:dx,
dy:dy,
time:Date.now()

});

});

</script>

</body>
</html>
